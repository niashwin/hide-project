# Phase 1: "Memory in a Box" — bAbI Reasoning
# All hyperparameters in YAML, never hardcoded

embedding:
  model: "sentence-transformers/all-MiniLM-L6-v2"
  dim: 384
  gpu: "cuda:1"
  batch_size: 512

context_projector:
  input_dim: 768  # 384 content + 384 positional
  output_dim: 384
  lr: 1.0e-3
  weight_decay: 1.0e-4
  epochs: 10
  batch_size: 256
  temperature: 0.07
  validation_split: 0.1
  gpu: "cuda:1"

generation:
  model: "Qwen/Qwen2.5-7B"
  fallback: "Qwen/Qwen2.5-3B"
  gpu: "cuda:0"
  max_new_tokens: 10
  temperature: 0.0

babi:
  dataset: "facebook/babi_qa"
  fallback_dataset: "arai-lab/bAbI"
  variant: "en-10k"
  tasks: [1, 2, 3, 4, 5]
  retrieval_k:
    1: 3
    2: 5
    3: 5
    4: 5
    5: 5
  max_test_samples: 1000

memory_scaling:
  sizes: [10, 50, 100, 200, 500, 1000, 2000, 5000]
  n_queries: 100

baselines:
  - no_memory
  - full_context
  - random_retrieval
  - vanilla_rag

seeds: [42, 123, 456, 789, 1024]

positional_encoding:
  dim: 384
  max_len: 500
